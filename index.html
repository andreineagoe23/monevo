<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Dark mode: apply .dark class before paint to prevent FOUC -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("monevo-theme");
          if (saved === "light") {
            document.documentElement.classList.remove("dark");
          } else {
            // Default: dark
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>

    <!-- Preconnect to font origins so they load in parallel -->
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- SEO -->
    <meta
      name="description"
      content="Monevo — Handcrafted web design and custom development for local businesses. Fast, secure, and built to rank. By Andrei Neagoe."
    />
    <meta
      name="keywords"
      content="web design London, web development local business, custom website, SEO, Monevo, Andrei Neagoe"
    />
    <meta name="theme-color" content="#0B0B0F" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://monevo.tech" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Monevo — Web design for businesses ready to grow" />
    <meta
      property="og:description"
      content="Handcrafted websites — fast, secure, and built to rank. One client at a time."
    />
    <meta property="og:url" content="https://monevo.tech" />
    <meta property="og:image" content="https://monevo.tech/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Monevo — Web design for businesses ready to grow" />
    <meta name="twitter:description" content="Handcrafted websites — fast, secure, and built to rank." />

    <title>Monevo — Web design for businesses ready to grow</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
